    <h1>Formulario de Contacto</h1>

    <p>Para mayor informacion llene el formulario y cuentenos el problema</p>
    
    <form action="#" method="POST">
        <fieldset>
            <legend>Datos Personales</legend>
            <label for="nombre">Nombre Completo:</label><br>
            <input type="text" id="nombre" name="nombre" required><br><br>

            <label for="email">Correo Electrónico:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="tipo">¿Qué buscas?</label><br>
            <select id="tipo" name="tipo">
                <option value="compra">Comprar una Laptop</option>
                <option value="servicio">Servicio Técnico</option>
                <option value="reclamo">Libro de Recomendaciones</option>
            </select><br><br>

            <label for="mensaje">Mensaje:</label><br>
            <textarea id="mensaje" name="mensaje" rows="4" cols="50"></textarea><br><br>

            <input type="submit" value="Enviar Consulta">
        </fieldset>
    </form>
